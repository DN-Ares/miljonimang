<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Kalkulaator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>Kalkulaator</h1>
        <input type="number" id="num1" placeholder="Esimene arv">
        <select id="operation">
            <option value="add">+</option>
            <option value="sub">-</option>
            <option value="mul">*</option>
            <option value="div">/</option>
        </select>
        <input type="number" id="num2" placeholder="Teine arv">
        <button id="calculate">Arvuta</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
